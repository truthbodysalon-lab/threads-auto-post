name: Threads Watchdog (Mac非依存の外形監視・自己修復)

on:
  schedule:
    # 30分毎（UTC）。スクリプト側でJST 6:00-23:00を判定して時間外は即終了
    - cron: '5,35 * * * *'
  workflow_dispatch:

concurrency:
  group: threads-watchdog
  cancel-in-progress: false

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Tokyo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create .env from secrets
        run: |
          cat > .env << EOF
          THREADS_APP_ID=${{ secrets.THREADS_APP_ID }}
          THREADS_APP_SECRET=${{ secrets.THREADS_APP_SECRET }}
          THREADS_ACCESS_TOKEN_TRUTH=${{ secrets.THREADS_ACCESS_TOKEN_TRUTH }}
          THREADS_USER_ID_TRUTH=${{ secrets.THREADS_USER_ID_TRUTH }}
          THREADS_ACCESS_TOKEN_NAGAOKA=${{ secrets.THREADS_ACCESS_TOKEN_NAGAOKA }}
          THREADS_USER_ID_NAGAOKA=${{ secrets.THREADS_USER_ID_NAGAOKA }}
          THREADS_ACCESS_TOKEN_MASA=${{ secrets.THREADS_ACCESS_TOKEN_MASA }}
          THREADS_USER_ID_MASA=${{ secrets.THREADS_USER_ID_MASA }}
          GH_PAT=${{ secrets.GH_PAT }}
          GH_REPO=${{ github.repository }}
          EOF

      - name: Run CI watchdog (外形監視 → 自己修復 → 通知記録)
        run: python3 watchdog_ci.py

      - name: Commit state & logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add watchdog_ci_state.json line_listin_state.json \
                  log_*_posted.jsonl log_*.jsonl shared_posted_guard.jsonl notifications.jsonl 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: watchdog-ci state [skip ci]"
          for i in 1 2 3; do
            git push && break
            git pull --rebase origin main
          done
