name: Threads Insights

on:
  schedule:
    # 毎日 6:00 JST (21:00 UTC 前日)
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  insights:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create .env from secrets
        run: |
          cat > .env << 'EOF'
          THREADS_APP_ID=${{ secrets.THREADS_APP_ID }}
          THREADS_APP_SECRET=${{ secrets.THREADS_APP_SECRET }}
          THREADS_ACCESS_TOKEN_TRUTH=${{ secrets.THREADS_ACCESS_TOKEN_TRUTH }}
          THREADS_USER_ID_TRUTH=${{ secrets.THREADS_USER_ID_TRUTH }}
          THREADS_ACCESS_TOKEN_NAGAOKA=${{ secrets.THREADS_ACCESS_TOKEN_NAGAOKA }}
          THREADS_USER_ID_NAGAOKA=${{ secrets.THREADS_USER_ID_NAGAOKA }}
          THREADS_ACCESS_TOKEN_MASA=${{ secrets.THREADS_ACCESS_TOKEN_MASA }}
          THREADS_USER_ID_MASA=${{ secrets.THREADS_USER_ID_MASA }}
          EOF

      - name: Run insights
        run: python3 insights.py

      - name: Commit insights data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add insights_truth.json insights_nagaoka.json insights_masa.json \
                  past_posts.json past_posts_nagaoka.json past_posts_masa.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update insights [skip ci]"
          for i in 1 2 3; do
            git push && break
            git pull --rebase origin main
          done
