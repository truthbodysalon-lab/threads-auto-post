name: Threads Auto Post

on:
  schedule:
    # 20分おきに実行（UTC）。スクリプト側でJST 6:00-23:00を判定
    - cron: '2,12,22,32,42,52 * * * *'
  workflow_dispatch:

concurrency:
  group: threads-auto-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install PyNaCl --quiet

      - name: Create .env from secrets
        run: |
          cat > .env << EOF
          THREADS_APP_ID=${{ secrets.THREADS_APP_ID }}
          THREADS_APP_SECRET=${{ secrets.THREADS_APP_SECRET }}
          THREADS_ACCESS_TOKEN_TRUTH=${{ secrets.THREADS_ACCESS_TOKEN_TRUTH }}
          THREADS_USER_ID_TRUTH=${{ secrets.THREADS_USER_ID_TRUTH }}
          THREADS_ACCESS_TOKEN_NAGAOKA=${{ secrets.THREADS_ACCESS_TOKEN_NAGAOKA }}
          THREADS_USER_ID_NAGAOKA=${{ secrets.THREADS_USER_ID_NAGAOKA }}
          THREADS_ACCESS_TOKEN_MASA=${{ secrets.THREADS_ACCESS_TOKEN_MASA }}
          THREADS_USER_ID_MASA=${{ secrets.THREADS_USER_ID_MASA }}
          GH_PAT=${{ secrets.GH_PAT }}
          GH_REPO=${{ github.repository }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          EOF

      - name: Prefill post queue if empty
        run: |
          python3 -c "
          import json, subprocess, sys
          from pathlib import Path
          from datetime import date
          today = date.today().strftime('%Y-%m-%d')
          def has_today(f):
              if not Path(f).exists(): return False
              return any(json.loads(l).get('date')==today and json.loads(l).get('posts') for l in Path(f).read_text().splitlines() if l.strip())
          if not has_today('log_truth.jsonl'):
              print('truth: キューなし → generate_remix で生成')
              subprocess.run([sys.executable, 'generate_remix.py', 'truth'], check=False)
          if not has_today('log_nagaoka.jsonl'):
              print('nagaoka: キューなし → generate_remix で生成')
              subprocess.run([sys.executable, 'generate_remix.py', 'nagaoka'], check=False)
          if not has_today('log_masa.jsonl'):
              print('masa: キューなし → generate_remix で生成')
              subprocess.run([sys.executable, 'generate_remix.py', 'masa'], check=False)
          "

      # 2026-07-10 一本化: orchestrator(旧系統・ペース制御なし・重複ループ対策なし)を廃止し、
      # ローカルと同一の auto_post.py（ペース回廊・バースト回復・50本/日担保・全修正入り）だけを使う。
      # GitHub Actionsのschedule遅延で実行が3〜12回/日でも、各回のバースト回復(最大15本)で
      # Mac停止時も50本/日に到達できる。
      - name: Run auto_post (pace-aware batch)
        run: python3 auto_post.py all || true
        timeout-minutes: 15

      - name: Sync refreshed tokens to GitHub Secrets
        run: python3 token_manager.py --sync-secrets
        continue-on-error: true

      - name: Commit updated log files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add log_truth.jsonl log_masa.jsonl log_nagaoka.jsonl \
                  log_truth_posted.jsonl log_masa_posted.jsonl log_nagaoka_posted.jsonl \
                  insights_truth.json insights_nagaoka.json insights_masa.json \
                  weights_truth.json weights_nagaoka.json weights_masa.json \
                  feedback.json line_listin_state.json shared_posted_guard.jsonl 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update logs [skip ci]"
          for i in 1 2 3; do
            git push && break
            echo "Push failed (attempt $i), retrying..."
            git pull --rebase origin main
          done
